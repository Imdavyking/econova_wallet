    <script>
      window.addEventListener("error", (e) => {
        console.error(
          "window.onerror:",
          e.message,
          e.filename,
          e.lineno,
          e.error?.stack,
        );
      });
      window.addEventListener("unhandledrejection", (e) => {
        console.error(
          "unhandledrejection:",
          e.reason?.message ?? e.reason,
          e.reason?.stack,
        );
      });

      function waitForProofFn(timeoutMs = 30000) {
        return new Promise((resolve, reject) => {
          const start = Date.now();
          const poll = () => {
            if (typeof window.__zkGenerateProof === "function") {
              resolve();
            } else if (Date.now() - start > timeoutMs) {
              reject(new Error("Timed out waiting for __zkGenerateProof"));
            } else {
              setTimeout(poll, 100);
            }
          };
          poll();
        });
      }
